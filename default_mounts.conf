# default_mounts.conf — extra volume mounts for agentbox containers
#
# Format: host_path:container_path[:options]  (one per line)
#
#   host_path      Absolute path, or starting with ~/ (expanded to $HOME).
#                  Use ${AGENT_DIR} to reference the agentbox install directory.
#   container_path Absolute path inside the container. A path starting with ./
#                  is treated as relative to the project workdir and rewritten
#                  to /home/devbox/app/<rest>.
#                  Example: ./tools  →  /home/devbox/app/tools
#   options        Optional mount options (e.g. ro for read-only), appended
#                  after a third colon. Example: ~/.ssh/:./ssh/:ro
#
# Rules:
#   - Lines beginning with # and blank lines are ignored.
#   - A mount is silently skipped if the host path does not exist.
#   - SELinux :z relabeling is applied automatically when running under podman.
#
# ── default mounts ────────────────────────────────────────────────────────────

# SSH keys — read-only. Both the directory and known_hosts are listed so the
# agent can find key files and suppress host-verification prompts.
~/.ssh/:/home/devbox/.ssh/:ro
~/.ssh/known_hosts:/home/devbox/.ssh/known_hosts:ro

# skills/ and workflows/ from the agentbox install directory are overlaid onto
# the project worktree so the agent can use them without polluting git history.
${AGENT_DIR}/skills:./skills
${AGENT_DIR}/workflows:./workflows

# ── user mounts ───────────────────────────────────────────────────────────────
# Add your own mounts below. Examples:
#   ~/notes:/home/devbox/notes
#   /data/shared:./data:ro
